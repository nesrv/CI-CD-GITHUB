<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <div class="container">
        <h1>🛒 E-Shop</h1>
        
        <div class="products" hx-get="/products" hx-trigger="load" hx-swap="innerHTML"></div>
        
        <div class="cart">
            <h2>Корзина</h2>
            <div id="cart" hx-get="/cart" hx-trigger="load" hx-swap="innerHTML"></div>
        </div>
    </div>
</body>
</html>
